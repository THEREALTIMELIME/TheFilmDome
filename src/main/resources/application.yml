logging:
  file:
    name: logs/webserver.log

  level:
    root: INFO

    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.engine.transaction.jta.platform.internal: ERROR

    org.springframework.orm.jpa: WARN
    org.springframework.data.jpa: WARN
    org.springframework.web.servlet.DispatcherServlet: WARN

    org.thymeleaf: ERROR

  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 30
      total-size-cap: 500MB
      file-name-pattern: logs/webserver.%d{yyyy-MM-dd}.%i.log

