<head th:fragment="head" xmlns:th="http://www.w3.org/1999/xhtml">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Fragment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/user-login-signup-style.css">

<footer th:fragment="foot" class="py-2 text-end pe-5 fs-5 text-white fw-bold" style="background-color: rgba(63, 81, 181, 0.95);" xmlns:th="http://www.w3.org/1999/xhtml">© 2026 Film Dome, Inc</footer>

<nav th:fragment="nav" xmlns:th="http://www.w3.org/1999/xhtml">
    <ul>
        <li><a href="/homePage1" th:href="@{/homePage1}">Home</a></li>
        <li><a href="/newsPage" th:href="@{/newsPage}">News</a></li>
        <li><a href="/searchPage" th:href="@{/searchPage}">Search</a></li>
        <li><a href="/sessionEndLogout" th:href="@{/sessionEndLogout}">Sign Out</a></li>
    </ul>
    <div th:if="${session.user != null}">
        <a th:href="@{'/processUserBio?id=' + ${session.user.id}}"
           class="fs-3 font-weight-bold text-white"
           th:text="${session.user.firstName + ' ' + session.user.lastName}"></a>
    </div>
    <div th:unless="${session.user != null}">
        <span class="text-white">Welcome, Guest</span>
    </div>
