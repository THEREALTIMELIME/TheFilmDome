<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<div th:replace="~{fragments/pageLayout :: head}"></div>

<body>

<div th:replace="~{fragments/pageLayout :: nav}"></div>

<div class="container">
    <div class="container-fluid">

        <div class="col-md-12 mt-5 text-bold">
            <div class="fs-1">
                <p>
                    <span th:text="${movie.name}"></span>
                </p>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <p class="fs-4">
                    <span th:text="${movie.runTime} + ' minutes | ' + ${movie.rating}"></span>
                </p>
            </div>
        </div>

        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-3">
                    <img class="poster-img" th:src="@{'https://image.tmdb.org/t/p/w500' + ${movie.poster}}" style="width: 300px; height:400px"/>
                </div>
                <div class="col-md-8">
                    <iframe width="100%" height="400" th:src="@{'https://www.youtube.com/embed/' + ${movie.trailer}}" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md fs-3 mt-2">
                <p th:text="${movie.description}"></p>
            </div>
        </div>

        <div class="row">
            <div class="col-md fs-3">
                <p>
                    <b>Director: </b>
                    <span th:text="${movie.director}"></span>
                </p>
            </div>
        </div>

        <div class="row">
            <div class="col-md fs-3">
                <p><b>Studios:</b></p>
                <div th:each="studio : ${movie.studios}">
                    <span th:text="${studio.name}"></span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md fs-3">
                <p><b>Cast:</b></p>
                <div class="row">
                    <div class="col-auto" th:each="actor : ${movie.actors}" th:if="${actor.poster != null}">
                        <a th:href="@{'/actorSelection?id=' + ${actor.id}}">
                            <img class="movieImage" th:src="@{'https://image.tmdb.org/t/p/w500' + ${actor.poster}}" style="width:150px; height:225px"/>
                            <p class="text-center text-decoration-none text-dark">
                                <span th:text="${actor.actorName}"></span>
                            </p>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<div th:replace="~{fragments/pageLayout :: foot}"></div>
</html>
